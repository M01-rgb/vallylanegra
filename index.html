<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Valy la Negra - Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background-color: #ffe6f2;
            color: #1e293b;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #ff66a3, #ff4d94);
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 10px 0;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 1.2rem;
            white-space: nowrap;
        }

        .search-bar {
            flex: 1;
            position: relative;
            min-width: 150px;
        }

        .search-bar input {
            width: 100%;
            padding: 8px 30px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
        }

        .search-bar .fa-search {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-actions button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff3366;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        /* Promo */
        .promo-section {
            background: linear-gradient(135deg, #ff99cc, #ff80bf);
            color: white;
            padding: 20px 0;
            text-align: center;
        }

        .promo-banner h2 {
            font-size: 1.2rem;
        }

        .promo-banner p {
            font-size: 0.8rem;
        }

        /* Catégories */
        .category-nav {
            background: white;
            padding: 10px 0;
            overflow-x: auto;
            white-space: nowrap;
        }

        .categories {
            display: flex;
            gap: 8px;
            padding: 0 15px;
        }

        .category-btn {
            background: #ffe6f2;
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 13px;
            color: #ff4d94;
            cursor: pointer;
        }

        .category-btn.active {
            background: #ff4d94;
            color: white;
        }

        /* Produits */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px 0;
        }

        @media (min-width: 600px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 900px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .product-image {
            height: 150px;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 10px;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .product-price {
            color: #ff4d94;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .add-to-cart {
            width: 100%;
            background: #ff4d94;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        /* Panier Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100vh;
            background: white;
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .cart-sidebar {
                width: 400px;
                right: -400px;
            }
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            background: white;
        }

        .cart-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-size: 14px;
            font-weight: 600;
        }

        .cart-item-price {
            color: #ff4d94;
            font-weight: bold;
            font-size: 13px;
            margin: 5px 0;
        }

        .quantity-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .quantity-btn {
            background: #ffe6f2;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 5px;
            cursor: pointer;
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Formulaire adresse */
        .address-form {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
        }

        .address-form h4 {
            margin-bottom: 12px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        /* Paiement */
        .payment-methods {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }

        .payment-method {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
        }

        .payment-method.selected {
            border-color: #ff4d94;
            background: #fff0f3;
        }

        .payment-section {
            margin: 15px 0;
        }

        .btn-payment {
            width: 100%;
            padding: 14px;
            background: #ff4d94;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .cart-footer {
            padding: 15px;
            border-top: 1px solid #eee;
            background: white;
        }

        .cart-total {
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        /* Modal inscription */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 2001;
            display: none;
        }
    </style>
    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
      import { getFirestore } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
      import { getStorage } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-storage.js";
      
      window.firebaseConfig = {
        apiKey: "AIzaSyAG0n1uwFULiy3x00OXHsFUQCetRGhjTjU",
        authDomain: "valy-3c8d8.firebaseapp.com",
        projectId: "valy-3c8d8",
        storageBucket: "valy-3c8d8.firebasestorage.app",
        messagingSenderId: "231448443924",
        appId: "1:231448443924:web:366b608f77368cd720fb01"
      };
      
      window.firebaseApp = initializeApp(window.firebaseConfig);
      window.firebaseDB = getFirestore(window.firebaseApp);
      window.firebaseStorage = getStorage(window.firebaseApp);
    </script>
</head>
<body>

<!-- Modal inscription -->
<div id="registrationModal" class="modal active">
    <div class="modal-content">
        <h2 style="color:#ff4d94; margin-bottom:15px;">Bienvenue ! 🛍️</h2>
        <form id="registrationForm">
            <div class="input-group">
                <input type="text" id="userName" placeholder="Nom complet" required>
            </div>
            <div class="input-group">
                <input type="email" id="userEmail" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="tel" id="userPhone" placeholder="Téléphone" required>
            </div>
            <button type="submit" style="width:100%; padding:12px; background:#ff4d94; color:white; border:none; border-radius:8px;">Accéder</button>
        </form>
    </div>
</div>

<!-- Header -->
<header class="header">
    <div class="container">
        <div class="header-content">
            <div class="logo">
                <h1>Valy la Negra</h1>
            </div>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Rechercher...">
            </div>
            <div class="header-actions">
                <button id="profileBtn"><i class="fas fa-user"></i></button>
                <button class="cart-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cartCount" class="cart-count">0</span>
                </button>
            </div>
        </div>
    </div>
</header>

<!-- Promo -->
<section class="promo-section">
    <div class="container">
        <div class="promo-banner">
            <h2>🔥 Offres Spéciales</h2>
            <p>Jusqu'à 70% de réduction</p>
        </div>
    </div>
</section>

<!-- Catégories -->
<nav class="category-nav">
    <div class="categories">
        <button class="category-btn active" data-category="all">Tous</button>
        <button class="category-btn" data-category="clothing">Vêtements</button>
        <button class="category-btn" data-category="shoes">Chaussures</button>
        <button class="category-btn" data-category="electronics">Électronique</button>
        <button class="category-btn" data-category="home">Maison</button>
    </div>
</nav>

<!-- Produits -->
<main>
    <div class="container">
        <div id="productsGrid" class="products-grid"></div>
    </div>
</main>

<!-- Panier -->
<div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header">
        <h3>Mon Panier</h3>
        <button onclick="toggleCart()" style="background:none; border:none; font-size:24px;">&times;</button>
    </div>
    
    <div class="cart-scroll">
        <div id="cartItems"></div>
        
        <div id="addressFormBlock" class="address-form" style="display:none;">
            <h4>📦 Livraison</h4>
            <div class="form-group"><input type="text" id="shippingName" placeholder="Nom complet"></div>
            <div class="form-group"><input type="text" id="shippingAddress" placeholder="Adresse"></div>
            <div class="form-group"><input type="text" id="shippingCity" placeholder="Ville"></div>
            <div class="form-group"><input type="text" id="shippingZip" placeholder="Code postal"></div>
            <div class="form-group"><input type="tel" id="shippingPhone" placeholder="Téléphone"></div>
        </div>
        
        <div class="payment-methods">
            <div class="payment-method selected" data-payment="paypal">
                <i class="fab fa-paypal"></i> PayPal
            </div>
            <div class="payment-method" data-payment="card">
                <i class="fas fa-credit-card"></i> Carte
            </div>
        </div>
        
        <div id="paypalSection" class="payment-section">
            <div id="paypal-button-container"></div>
        </div>
        
        <div id="cardSection" class="payment-section" style="display:none;">
            <div class="form-group"><input type="text" id="cardNumber" placeholder="Numéro de carte"></div>
            <div style="display:flex; gap:10px;">
                <div class="form-group"><input type="text" id="cardExpiry" placeholder="MM/AA"></div>
                <div class="form-group"><input type="text" id="cardCvc" placeholder="CVC"></div>
            </div>
            <div class="form-group"><input type="text" id="cardName" placeholder="Nom sur la carte"></div>
            <button id="payWithCardBtn" class="btn-payment">Payer avec carte</button>
        </div>
    </div>
    
    <div class="cart-footer">
        <div class="cart-total">Total: $<span id="cartTotal">0.00</span></div>
        <div style="text-align:center; font-size:11px; color:#999;"><i class="fas fa-lock"></i> Paiement sécurisé</div>
    </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="notification" class="notification"></div>

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=AbwMkMBOX07ZL9hNJiITKqY26Jek-00_QIqwk-Aeo1fLYj7ZhsZgML_1Z2Oh7Q0JyYD7nwHHo2cDSu19&currency=USD&intent=capture"></script>

<script>
    // Produits de démonstration
    const products = [
        { id: 1, name: "Robe élégante", price: 49.99, category: "clothing", image: "https://picsum.photos/id/20/300/300" },
        { id: 2, name: "Jean slim", price: 59.99, category: "clothing", image: "https://picsum.photos/id/21/300/300" },
        { id: 3, name: "Baskets Nike", price: 89.99, category: "shoes", image: "https://picsum.photos/id/22/300/300" },
        { id: 4, name: "iPhone 13", price: 699.99, category: "electronics", image: "https://picsum.photos/id/23/300/300" },
        { id: 5, name: "Lampe design", price: 39.99, category: "home", image: "https://picsum.photos/id/24/300/300" },
        { id: 6, name: "Sac à main", price: 79.99, category: "clothing", image: "https://picsum.photos/id/25/300/300" }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let currentUser = null;
    let currentPayment = 'paypal';
    let allProducts = [...products];
    let filteredProducts = [...products];
    let searchTerm = '';
    let currentCategory = 'all';

    function showNotification(msg, isError = false) {
        const notif = document.getElementById('notification');
        notif.textContent = msg;
        notif.style.backgroundColor = isError ? '#f44336' : '#4caf50';
        notif.style.display = 'block';
        setTimeout(() => notif.style.display = 'none', 2500);
    }

    function getTotal() {
        return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    }

    function validateAddress() {
        const name = document.getElementById('shippingName')?.value.trim();
        const address = document.getElementById('shippingAddress')?.value.trim();
        const city = document.getElementById('shippingCity')?.value.trim();
        const zip = document.getElementById('shippingZip')?.value.trim();
        const phone = document.getElementById('shippingPhone')?.value.trim();
        if (!name || !address || !city || !zip || !phone) {
            showNotification("Veuillez remplir toute l'adresse", true);
            return false;
        }
        return { name, address, city, zip, phone };
    }

    function saveCart() {
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
    }

    function updateCartUI() {
        const cartItemsDiv = document.getElementById('cartItems');
        const cartCountSpan = document.getElementById('cartCount');
        const cartTotalSpan = document.getElementById('cartTotal');
        const addressBlock = document.getElementById('addressFormBlock');
        
        cartCountSpan.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
        cartTotalSpan.textContent = getTotal().toFixed(2);
        
        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<div class="empty-cart"><i class="fas fa-shopping-cart"></i><p>Panier vide</p></div>';
            if (addressBlock) addressBlock.style.display = 'none';
            return;
        }
        
        cartItemsDiv.innerHTML = cart.map(item => `
            <div class="cart-item">
                <img src="${item.image}" alt="${item.name}">
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-price">$${item.price}</div>
                    <div class="quantity-controls">
                        <button class="quantity-btn" onclick="updateQty('${item.id}', -1)">-</button>
                        <span>${item.quantity}</span>
                        <button class="quantity-btn" onclick="updateQty('${item.id}', 1)">+</button>
                        <button class="quantity-btn" onclick="removeItem('${item.id}')" style="background:#ff4444; color:white;">×</button>
                    </div>
                </div>
            </div>
        `).join('');
        
        if (addressBlock) addressBlock.style.display = 'block';
        
        if (currentPayment === 'paypal' && getTotal() > 0) {
            setTimeout(() => loadPayPal(), 200);
        }
    }
    
    function updateQty(id, delta) {
        const item = cart.find(i => i.id == id);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(i => i.id != id);
            saveCart();
        }
    }
    
    function removeItem(id) {
        cart = cart.filter(i => i.id != id);
        saveCart();
    }
    
    function addToCart(product) {
        const existing = cart.find(i => i.id === product.id);
        if (existing) existing.quantity++;
        else cart.push({ ...product, quantity: 1 });
        saveCart();
        showNotification(`${product.name} ajouté !`);
    }
    
    function toggleCart() {
        const sidebar = document.getElementById('cartSidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        if (sidebar.classList.contains('active') && currentPayment === 'paypal' && getTotal() > 0) {
            setTimeout(() => loadPayPal(), 300);
        }
    }
    
    function loadPayPal() {
        const container = document.getElementById('paypal-button-container');
        if (!container) return;
        container.innerHTML = '';
        if (getTotal() <= 0) return;
        
        paypal.Buttons({
            createOrder: (data, actions) => {
                if (!validateAddress()) return Promise.reject();
                return actions.order.create({
                    purchase_units: [{
                        amount: { value: getTotal().toFixed(2), currency_code: "USD" },
                        description: "Valy la Negra"
                    }]
                });
            },
            onApprove: (data, actions) => actions.order.capture().then(details => processOrder('paypal', details.id)),
            onError: err => showNotification("Erreur PayPal", true)
        }).render('#paypal-button-container');
    }
    
    function processOrder(method, transactionId = null) {
        const address = validateAddress();
        if (!address) return;
        
        const order = {
            id: Date.now(),
            user: currentUser,
            items: [...cart],
            total: getTotal(),
            address: address,
            paymentMethod: method,
            transactionId: transactionId,
            date: new Date().toISOString()
        };
        
        const orders = JSON.parse(localStorage.getItem('orders') || '[]');
        orders.push(order);
        localStorage.setItem('orders', JSON.stringify(orders));
        
        cart = [];
        saveCart();
        toggleCart();
        showNotification(`✅ Commande confirmée ! Total: $${order.total}`);
        setTimeout(() => alert(`Commande validée !\nTotal: $${order.total}\nLivraison: ${address.address}\nMerci !`), 500);
    }
    
    function displayProducts() {
        const grid = document.getElementById('productsGrid');
        let filtered = allProducts;
        if (currentCategory !== 'all') filtered = filtered.filter(p => p.category === currentCategory);
        if (searchTerm) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm));
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty-cart" style="grid-column:1/-1;">Aucun produit</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(p => `
            <div class="product-card">
                <div class="product-image"><img src="${p.image}" alt="${p.name}"></div>
                <div class="product-info">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">$${p.price}</div>
                    <button class="add-to-cart" onclick="addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')})">Ajouter</button>
                </div>
            </div>
        `).join('');
    }
    
    // Événements
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            displayProducts();
        });
    });
    
    document.getElementById('searchInput')?.addEventListener('input', (e) => {
        searchTerm = e.target.value.toLowerCase();
        displayProducts();
    });
    
    document.querySelectorAll('.payment-method').forEach(m => {
        m.addEventListener('click', () => {
            document.querySelectorAll('.payment-method').forEach(p => p.classList.remove('selected'));
            m.classList.add('selected');
            currentPayment = m.dataset.payment;
            document.getElementById('paypalSection').style.display = currentPayment === 'paypal' ? 'block' : 'none';
            document.getElementById('cardSection').style.display = currentPayment === 'card' ? 'block' : 'none';
            if (currentPayment === 'paypal' && getTotal() > 0) loadPayPal();
        });
    });
    
    document.getElementById('payWithCardBtn')?.addEventListener('click', () => {
        const cardNum = document.getElementById('cardNumber')?.value;
        const cardExp = document.getElementById('cardExpiry')?.value;
        const cardCvc = document.getElementById('cardCvc')?.value;
        const cardName = document.getElementById('cardName')?.value;
        if (!cardNum || !cardExp || !cardCvc || !cardName) {
            showNotification("Remplissez tous les champs carte", true);
            return;
        }
        if (cardNum.replace(/\s/g, '').length < 15) {
            showNotification("Carte invalide", true);
            return;
        }
        processOrder('card', 'card_' + Date.now());
    });
    
    document.getElementById('registrationForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        currentUser = {
            name: document.getElementById('userName').value,
            email: document.getElementById('userEmail').value,
            phone: document.getElementById('userPhone').value
        };
        localStorage.setItem('user', JSON.stringify(currentUser));
        document.getElementById('registrationModal').classList.remove('active');
        showNotification(`Bienvenue ${currentUser.name} !`);
        displayProducts();
    });
    
    document.getElementById('profileBtn')?.addEventListener('click', () => {
        if (currentUser) alert(`👤 ${currentUser.name}\n📧 ${currentUser.email}\n📞 ${currentUser.phone}`);
        else document.getElementById('registrationModal').classList.add('active');
    });
    
    document.getElementById('overlay')?.addEventListener('click', toggleCart);
    
    // Chargement initial
    const savedUser = localStorage.getItem('user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('registrationModal').classList.remove('active');
    }
    displayProducts();
    updateCartUI();
    
    window.toggleCart = toggleCart;
    window.addToCart = addToCart;
    window.updateQty = updateQty;
    window.removeItem = removeItem;
</script>
</body>
</html>
